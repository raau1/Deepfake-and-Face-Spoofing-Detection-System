    deepfakes: "C:/Users/Lucas/Desktop/Raul/FINAL YEAR PROJECT/data/FaceForensics++/Deepfakes"
    face2face: "C:/Users/Lucas/Desktop/Raul/FINAL YEAR PROJECT/data/FaceForensics++/Face2Face"
    faceswap: "C:/Users/Lucas/Desktop/Raul/FINAL YEAR PROJECT/data/FaceForensics++/FaceSwap"
    faceshifter: "C:/Users/Lucas/Desktop/Raul/FINAL YEAR PROJECT/data/FaceForensics++/FaceShifter"
    neural_textures: "C:/Users/Lucas/Desktop/Raul/FINAL YEAR PROJECT/data/FaceForensics++/NeuralTextures"
    deepfake_detection: "C:/Users/Lucas/Desktop/Raul/FINAL YEAR PROJECT/data/FaceForensics++/DeepFakeDetection"

  celebdf:
    root: "C:/Users/Lucas/Desktop/Raul/FINAL YEAR PROJECT/data/Celeb-DF-v2"
    celeb_real: "C:/Users/Lucas/Desktop/Raul/FINAL YEAR PROJECT/data/Celeb-DF-v2/Celeb-real"
    celeb_synthesis: "C:/Users/Lucas/Desktop/Raul/FINAL YEAR PROJECT/data/Celeb-DF-v2/Celeb-synthesis"
    youtube_real: "C:/Users/Lucas/Desktop/Raul/FINAL YEAR PROJECT/data/Celeb-DF-v2/YouTube-real"
